<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Outils — Charles Grenier</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --text: #111111;
      --muted: #999999;
      --line: #e7e7e7;
    }

    html { font-size: 13px; -webkit-font-smoothing: antialiased; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }

    .layout { max-width: 680px; margin: 0 auto; padding: 56px 32px 80px; }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 28px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 52px;
    }

    .site-title { font-size: 11px; font-weight: 400; letter-spacing: 0.1em; text-transform: uppercase; }
    .site-author { font-size: 11px; color: var(--muted); letter-spacing: 0.04em; }

    /* Sync dot */
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

    .section { margin-bottom: 52px; }
    .section-label { font-size: 10px; font-weight: 400; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }

    .project-list { margin-top: 16px; min-height: 4px; }
    .project-list.drag-over { outline: 1px dashed var(--line); outline-offset: -2px; border-radius: 2px; }

    .project {
      display: grid;
      grid-template-columns: 16px 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid var(--line);
      transition: opacity 150ms;
    }
    .project:first-child { border-top: 1px solid var(--line); }
    .project.dragging { opacity: 0.35; }
    .project.drag-above { box-shadow: 0 -2px 0 var(--text); }
    .project.drag-below { box-shadow: 0 2px 0 var(--text); }

    .drag-handle {
      display: flex; flex-direction: column; gap: 2.5px;
      align-items: center; justify-content: center;
      cursor: grab; opacity: 0; transition: opacity 150ms;
      padding: 4px 2px; flex-shrink: 0;
    }
    .drag-handle:active { cursor: grabbing; }
    .drag-handle span { display: block; width: 10px; height: 1px; background: var(--muted); }
    .project:hover .drag-handle { opacity: 1; }

    .project-info { min-width: 0; }
    .project-name { font-size: 13px; font-weight: 400; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .project-format { font-size: 11px; color: var(--muted); margin-top: 1px; }

    .project-tools { display: flex; gap: 16px; align-items: center; flex-shrink: 0; }

    .tool-link {
      font-size: 11px; color: var(--text); text-decoration: none;
      letter-spacing: 0.04em; border-bottom: 1px solid var(--line);
      padding-bottom: 1px; white-space: nowrap; transition: border-color 180ms ease;
    }
    .tool-link:hover { border-color: var(--text); }

    .tool-item { display: inline-flex; align-items: center; gap: 4px; }
    .tool-remove {
      background: none; border: none; cursor: pointer; padding: 0 1px;
      color: var(--muted); font-size: 12px; line-height: 1;
      opacity: 0; transition: opacity 150ms; flex-shrink: 0;
    }
    .tool-item:hover .tool-remove { opacity: 1; }
    .tool-remove:hover { color: var(--text); }

    .add-tool-btn {
      background: none; border: none; cursor: pointer;
      font-size: 15px; font-weight: 300; color: var(--muted); line-height: 1;
      padding: 0 3px; transition: color 150ms;
    }
    .add-tool-btn:hover { color: var(--text); }

    .tool-dropdown-wrap { position: relative; }
    .tool-dropdown {
      position: absolute; right: 0; top: calc(100% + 6px);
      background: #fff; border: 1px solid var(--line);
      border-radius: 4px; box-shadow: 0 4px 18px rgba(0,0,0,.1);
      z-index: 200; min-width: 170px; overflow: hidden;
    }
    .tool-dropdown button {
      display: block; width: 100%; text-align: left;
      background: none; border: none; cursor: pointer;
      padding: 10px 14px; font-size: 12px; color: var(--text);
      transition: background 100ms;
    }
    .tool-dropdown button:hover { background: var(--line); }

    footer { margin-top: 80px; padding-top: 20px; border-top: 1px solid var(--line); }
    .footer-text { font-size: 10px; color: var(--muted); letter-spacing: 0.06em; }
  </style>
</head>
<body>
  <div class="layout">

    <header>
      <span class="site-title">Outils</span>
      <div style="display:flex;align-items:center;gap:10px;">
        <div id="sync-dot" style="width:7px;height:7px;border-radius:50%;background:#bbbbbb;flex-shrink:0;transition:background 300ms;" title=""></div>
        <span class="site-author">Charles Grenier</span>
      </div>
    </header>

    <section class="section">
      <p class="section-label">En cours</p>
      <div class="project-list" id="list-en-cours" data-section="en-cours"></div>
    </section>

    <section class="section">
      <p class="section-label">En développement</p>
      <div class="project-list" id="list-en-dev" data-section="en-dev"></div>
    </section>

    <footer>
      <p class="footer-text">outils.charlesgrenier.com</p>
    </footer>

  </div>

  <script>
    const STORAGE_KEY  = 'outils_landing_v1';
    const SUPABASE_URL = 'https://dvivafrldxzhkactsvve.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR2aXZhZnJsZHh6aGthY3RzdnZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMzQ5MDgsImV4cCI6MjA5NDgxMDkwOH0.EgyxWDERi443hefaM0LxDYDhLWQYx31feKzQ1bQU5Kc';

    let projects = [];

    const AVAILABLE_TOOLS = [
      {
        id: 'tableau-lieux',
        label: 'Tableau des lieux',
        buildHref: p => '/tableau-des-lieux/?p=' + encodeURIComponent(p.id) + '&n=' + encodeURIComponent(p.name)
      }
    ];

    const DEFAULT_PROJECTS = [
      { id: 'derniere-saison', name: 'La dernière saison',      format: 'Série télévision', section: 'en-cours', tools: [] },
      { id: 'premier-trio',    name: 'Premier trio — Saison 4', format: 'Série télévision', section: 'en-cours', tools: [] },
      { id: 'les-chacals',     name: 'Les Chacals',             format: 'Long-métrage',     section: 'en-dev',   tools: [] },
      { id: 'aimer-pour-deux', name: 'Aimer pour deux',         format: 'Long-métrage',     section: 'en-dev',   tools: [] },
      { id: 'au-dela-terril',  name: 'Au-delà du terril',       format: 'Long-métrage',     section: 'en-dev',   tools: [] },
      { id: 'contritions',     name: 'Contritions / Clippeurs', format: 'Long-métrage',     section: 'en-dev',   tools: [] },
      { id: 'helga-testorf',   name: 'Helga Testorf',           format: 'Long-métrage',     section: 'en-dev',   tools: [] },
      { id: 'maison-lynch',    name: 'La maison du rang Lynch', format: 'Long-métrage',     section: 'en-dev',   tools: [] },
      { id: 'les-enfants',     name: 'Les enfants',             format: 'Série télévision', section: 'en-dev',   tools: [] },
    ];

    // ── Supabase ──────────────────────────────────────────────────────────────
    let sb = null;
    try { sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY); } catch(e) {}

    function setSyncStatus(s) {
      const dot = document.getElementById('sync-dot');
      if (!dot) return;
      const colors = { idle: '#bbbbbb', syncing: '#f0a500', synced: '#5a9a6a', error: '#cc3333' };
      dot.style.background = colors[s] || '#bbbbbb';
      dot.style.animation = s === 'syncing' ? 'pulse .9s infinite' : '';
      dot.title = { idle: '', syncing: 'Synchronisation…', synced: 'Synchronisé', error: 'Erreur de sync' }[s] || '';
    }

    async function loadFromSupabase() {
      if (!sb) return null;
      try {
        const { data, error } = await sb.from('project_data').select('data').eq('key', STORAGE_KEY).single();
        if (error || !data) return null;
        return data.data;
      } catch(e) { return null; }
    }

    async function saveToSupabase(state) {
      setSyncStatus('syncing');
      if (!sb) { setTimeout(() => setSyncStatus('idle'), 1500); return; }
      try {
        const { error } = await sb.from('project_data').upsert({ key: STORAGE_KEY, data: state, updated_at: new Date().toISOString() });
        if (error) throw error;
        setSyncStatus('synced');
        setTimeout(() => setSyncStatus('idle'), 2000);
      } catch(e) {
        setSyncStatus('error');
        console.warn('Supabase sync error:', e);
      }
    }

    // ── State ─────────────────────────────────────────────────────────────────
    const defaultById = {};
    DEFAULT_PROJECTS.forEach(p => defaultById[p.id] = p);

    function mergeState(saved) {
      if (!saved || !Array.isArray(saved)) return DEFAULT_PROJECTS.map(p => ({ ...p }));
      return saved
        .map(s => {
          if (!defaultById[s.id]) return null;
          return { ...defaultById[s.id], section: s.section, tools: s.tools || [] };
        })
        .filter(Boolean);
    }

    function getState() {
      const rows = [];
      ['en-cours', 'en-dev'].forEach(section => {
        document.getElementById('list-' + section).querySelectorAll('.project').forEach(row => {
          const p = projects.find(x => x.id === row.dataset.id);
          rows.push({ id: row.dataset.id, section, tools: (p && p.tools) ? p.tools : [] });
        });
      });
      return rows;
    }

    function saveLocal(state) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function loadLocal() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch(e) { return null; }
    }

    // ── Render ────────────────────────────────────────────────────────────────
    function buildHandle() {
      const h = document.createElement('div');
      h.className = 'drag-handle';
      h.title = 'Déplacer';
      for (let i = 0; i < 4; i++) h.appendChild(document.createElement('span'));
      return h;
    }

    function closeAllDropdowns() {
      document.querySelectorAll('.tool-dropdown').forEach(d => d.remove());
    }

    function addTool(projectId, toolId) {
      const p = projects.find(x => x.id === projectId);
      if (!p) return;
      const toolDef = AVAILABLE_TOOLS.find(t => t.id === toolId);
      if (!toolDef) return;
      if (!p.tools) p.tools = [];
      if (p.tools.some(t => t.id === toolId)) return;
      p.tools.push({ id: toolId, label: toolDef.label, href: toolDef.buildHref(p) });
      rebuildRow(p);
      const state = getState();
      saveLocal(state);
      saveToSupabase(state);
    }

    function removeTool(projectId, toolId) {
      const p = projects.find(x => x.id === projectId);
      if (!p || !p.tools) return;
      p.tools = p.tools.filter(t => t.id !== toolId);
      rebuildRow(p);
      const state = getState();
      saveLocal(state);
      saveToSupabase(state);
    }

    function rebuildRow(project) {
      const existing = document.querySelector(`.project[data-id="${project.id}"]`);
      if (existing) existing.replaceWith(buildRow(project));
    }

    function buildRow(project) {
      const row = document.createElement('div');
      row.className = 'project';
      row.dataset.id = project.id;
      row.draggable = true;
      row.appendChild(buildHandle());

      const info = document.createElement('div');
      info.className = 'project-info';
      info.innerHTML = `<div class="project-name">${project.name}</div><div class="project-format">${project.format}</div>`;
      row.appendChild(info);

      const toolsDiv = document.createElement('div');
      toolsDiv.className = 'project-tools';

      (project.tools || []).forEach(t => {
        const item = document.createElement('span');
        item.className = 'tool-item';
        const a = document.createElement('a');
        a.className = 'tool-link';
        a.href = t.href;
        a.textContent = t.label;
        const rmBtn = document.createElement('button');
        rmBtn.className = 'tool-remove';
        rmBtn.title = 'Retirer';
        rmBtn.textContent = '×';
        rmBtn.addEventListener('click', e => { e.stopPropagation(); e.preventDefault(); removeTool(project.id, t.id); });
        item.appendChild(a);
        item.appendChild(rmBtn);
        toolsDiv.appendChild(item);
      });

      const addedIds = new Set((project.tools || []).map(t => t.id));
      const remaining = AVAILABLE_TOOLS.filter(t => !addedIds.has(t.id));
      if (remaining.length) {
        const wrap = document.createElement('span');
        wrap.className = 'tool-dropdown-wrap';
        const btn = document.createElement('button');
        btn.className = 'add-tool-btn';
        btn.title = 'Ajouter un outil';
        btn.textContent = '+';
        btn.addEventListener('click', e => {
          e.stopPropagation();
          if (wrap.querySelector('.tool-dropdown')) { closeAllDropdowns(); return; }
          closeAllDropdowns();
          const dd = document.createElement('div');
          dd.className = 'tool-dropdown';
          remaining.forEach(toolDef => {
            const item = document.createElement('button');
            item.textContent = toolDef.label;
            item.addEventListener('click', e => { e.stopPropagation(); addTool(project.id, toolDef.id); });
            dd.appendChild(item);
          });
          wrap.appendChild(dd);
        });
        wrap.appendChild(btn);
        toolsDiv.appendChild(wrap);
      }

      row.appendChild(toolsDiv);
      return row;
    }

    function render(p) {
      projects = p;
      ['en-cours', 'en-dev'].forEach(section => {
        const list = document.getElementById('list-' + section);
        list.innerHTML = '';
        projects.filter(pr => pr.section === section).forEach(pr => list.appendChild(buildRow(pr)));
      });
    }

    // ── Drag & Drop ───────────────────────────────────────────────────────────
    let dragged = null;

    document.addEventListener('dragstart', e => {
      const row = e.target.closest('.project');
      if (!row) return;
      dragged = row;
      row.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });

    document.addEventListener('dragend', () => {
      if (dragged) dragged.classList.remove('dragging');
      document.querySelectorAll('.drag-above, .drag-below, .drag-over').forEach(el =>
        el.classList.remove('drag-above', 'drag-below', 'drag-over'));
      dragged = null;
    });

    document.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      const target = e.target.closest('.project');
      const list   = e.target.closest('.project-list');
      document.querySelectorAll('.drag-above, .drag-below').forEach(el =>
        el.classList.remove('drag-above', 'drag-below'));
      document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
      if (target && target !== dragged) {
        const mid = target.getBoundingClientRect().top + target.getBoundingClientRect().height / 2;
        target.classList.add(e.clientY < mid ? 'drag-above' : 'drag-below');
      } else if (list && !list.contains(dragged)) {
        list.classList.add('drag-over');
      }
    });

    document.addEventListener('drop', e => {
      e.preventDefault();
      if (!dragged) return;
      const target = e.target.closest('.project');
      const list   = e.target.closest('.project-list');
      if (!list) return;

      if (target && target !== dragged) {
        const mid = target.getBoundingClientRect().top + target.getBoundingClientRect().height / 2;
        list.insertBefore(dragged, e.clientY < mid ? target : target.nextSibling);
      } else if (!list.contains(dragged)) {
        list.appendChild(dragged);
      }

      const state = getState();
      saveLocal(state);
      saveToSupabase(state);
    });

    document.addEventListener('click', closeAllDropdowns);

    // ── Init ──────────────────────────────────────────────────────────────────
    async function init() {
      // Afficher local immédiatement (pas de flash)
      render(mergeState(loadLocal()));

      // Charger depuis Supabase et rafraîchir si nécessaire
      const remote = await loadFromSupabase();
      if (remote) {
        saveLocal(remote);
        render(mergeState(remote));
      }
    }

    init();
  </script>
</body>
</html>
