<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projet — Outils</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/src/fdx-parser.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg2: #f8f8f8; --bg3: #f0f0f0;
      --border: #e7e7e7; --border2: #cccccc;
      --text: #111111; --text-muted: #777777; --text-dim: #aaaaaa;
    }
    html { font-size: 13px; -webkit-font-smoothing: antialiased; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height: 1.4; }

    /* ── TOPBAR ── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg2); border-bottom: 1px solid var(--border);
      padding: 14px 24px; display: flex; align-items: center; gap: 14px;
    }
    .back-link { font-size: 11px; color: var(--text-muted); text-decoration: none; letter-spacing: .04em; padding-right: 12px; border-right: 1px solid var(--border); flex-shrink: 0; white-space: nowrap; }
    .back-link:hover { color: var(--text); }
    .project-title { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .project-format-lbl { font-size: 11px; color: var(--text-muted); flex-shrink: 0; white-space: nowrap; }
    .section-toggle { display: flex; gap: 4px; flex-shrink: 0; }
    .section-toggle button {
      background: var(--bg3); border: 1px solid var(--border); border-radius: 5px; cursor: pointer;
      font-family: inherit; font-size: 11px; color: var(--text-muted);
      padding: 5px 11px; transition: border-color .1s, background .1s, color .1s; white-space: nowrap;
    }
    .section-toggle button:hover { border-color: var(--border2); color: var(--text); }
    .section-toggle button.active { background: var(--text); border-color: var(--text); color: var(--bg); }
    .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border2); transition: background 300ms; flex-shrink: 0; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
    .sync-dot.syncing { background: #f0a500; animation: pulse .9s infinite; }
    .sync-dot.synced  { background: #5a9a6a; }
    .sync-dot.error   { background: #cc3333; }

    /* ── CONTENT ── */
    .content { max-width: 700px; margin: 0 auto; padding: 40px 24px 80px; }

    /* ── SECTIONS ── */
    .section { margin-bottom: 44px; }
    .section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .section-label { font-size: 10px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: var(--text-muted); }
    .btn { background: var(--bg3); border: 1px solid var(--border); border-radius: 5px; cursor: pointer; font-size: 12px; font-family: inherit; color: var(--text); padding: 6px 12px; white-space: nowrap; transition: border-color .1s; }
    .btn:hover { border-color: var(--border2); }

    /* ── SCÉNARIO ── */
    .scenario-box { border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
    .scenario-main { display: flex; align-items: flex-start; gap: 16px; padding: 14px 16px; }
    .scenario-info { flex: 1; min-width: 0; }
    .scenario-count { font-size: 14px; font-weight: 700; }
    .scenario-date { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
    .ep-lines { margin-top: 8px; display: flex; flex-direction: column; gap: 3px; }
    .ep-line { font-size: 11px; display: flex; align-items: baseline; gap: 5px; }
    .ep-num { color: var(--text); font-weight: 600; white-space: nowrap; }
    .ep-sep { color: var(--text-dim); }
    .ep-label { color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .scenario-link { font-size: 12px; color: var(--text); text-decoration: none; white-space: nowrap; border-bottom: 1px solid var(--border); padding-bottom: 1px; flex-shrink: 0; margin-top: 2px; }
    .scenario-link:hover { border-color: var(--text); }
    .scenario-empty { padding: 14px 16px; font-size: 12px; color: var(--text-muted); line-height: 1.6; }

    /* ── VERSIONS MINI ── */
    .versions-mini { border-top: 1px solid var(--border); padding: 10px 16px; }
    .versions-mini-title { font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; }
    .ver-mini-list { display: flex; flex-direction: column; gap: 4px; }
    .ver-mini-row { display: flex; align-items: center; gap: 12px; font-size: 11px; color: var(--text-muted); }
    .ver-mini-label { font-weight: 600; color: var(--text); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ver-mini-info { white-space: nowrap; }
    .ver-mini-delta { font-size: 10px; font-weight: 600; white-space: nowrap; }
    .ver-mini-delta.pos { color: #2a7a40; }
    .ver-mini-delta.neg { color: #cc3333; }
    .ver-mini-more { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

    /* ── OUTILS ── */
    .tool-row { display: flex; align-items: center; justify-content: space-between; padding: 13px 0; border-bottom: 1px solid var(--border); }
    .tool-row:first-of-type { border-top: 1px solid var(--border); }
    .tool-name { font-size: 13px; }
    .tool-actions { display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
    .btn-open { font-size: 11px; color: var(--text); text-decoration: none; letter-spacing: .04em; border-bottom: 1px solid var(--border); padding-bottom: 1px; }
    .btn-open:hover { border-color: var(--text); }
    .btn-remove { background: none; border: none; cursor: pointer; font-size: 14px; color: var(--text-muted); line-height: 1; padding: 0 2px; opacity: 0; transition: opacity 150ms; }
    .tool-row:hover .btn-remove { opacity: 1; }
    .btn-remove:hover { color: var(--text); }
    .no-tools { font-size: 12px; color: var(--text-muted); padding: 13px 0; }
    .add-tool-wrap { position: relative; margin-top: 14px; }
    .btn-add { background: none; border: 1px solid var(--border); border-radius: 3px; cursor: pointer; font-size: 11px; color: var(--text-muted); letter-spacing: .06em; padding: 7px 12px; font-family: inherit; }
    .btn-add:hover { border-color: var(--text); color: var(--text); }
    .tool-dropdown { position: absolute; left: 0; top: calc(100% + 6px); background: #fff; border: 1px solid var(--border); border-radius: 4px; box-shadow: 0 4px 18px rgba(0,0,0,.1); z-index: 200; min-width: 200px; overflow: hidden; }
    .tool-dropdown button { display: block; width: 100%; text-align: left; background: none; border: none; cursor: pointer; font-family: inherit; padding: 10px 14px; font-size: 12px; color: var(--text); }
    .tool-dropdown button:hover { background: var(--bg3); }
    /* ── FDX ADVANCED IMPORT ── */
    .fdx-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .fdx-modal { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; width: 100%; max-width: 620px; padding: 28px; box-shadow: 0 8px 40px rgba(0,0,0,0.18); max-height: 85vh; overflow-y: auto; }
    .fdx-modal-hd { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
    .fdx-modal-hd h2 { font-size: 16px; font-weight: 700; }
    .fdx-modal-sub { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
    .fdx-modal-close { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 16px; padding: 0; }
    .fdx-modal-close:hover { color: var(--text); }
    .fdx-opts-section { margin-bottom: 20px; }
    .fdx-opts-section:last-of-type { margin-bottom: 0; }
    .fdx-opts-label { font-size: 12px; font-weight: 700; margin-bottom: 10px; color: var(--text); }
    .fdx-opts-choices { display: flex; flex-direction: column; gap: 7px; }
    .fdx-opts-choice { display: flex; align-items: flex-start; gap: 9px; cursor: pointer; }
    .fdx-opts-choice input[type=radio] { margin-top: 2px; flex-shrink: 0; accent-color: var(--text); }
    .fdx-opts-choice-body { display: flex; flex-direction: column; gap: 2px; }
    .fdx-opts-choice-title { font-size: 12px; color: var(--text); }
    .fdx-opts-choice-ex { font-size: 11px; color: var(--text-muted); font-family: monospace; }
    .fdx-errors { background: #fff8e1; border: 1px solid #e8c840; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; }
    .fdx-err-hd { font-size: 12px; font-weight: 700; color: #7a5c00; margin-bottom: 6px; }
    .fdx-err-item { font-size: 11px; color: #7a5c00; margin-top: 3px; font-family: monospace; }
    .fdx-diff-wrap { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .fdx-diff-section { border-radius: 8px; padding: 12px 16px; }
    .fdx-added    { background: #f0faf4; border: 1px solid #a8d8bc; }
    .fdx-removed  { background: #fff5f5; border: 1px solid #e0b0b0; }
    .fdx-modified { background: #fffbf0; border: 1px solid #e0d080; }
    .fdx-no-diff  { font-size: 12px; color: var(--text-muted); padding: 8px 0; }
    .fdx-diff-hd  { font-size: 12px; font-weight: 700; margin-bottom: 8px; }
    .fdx-added .fdx-diff-hd   { color: #2a7045; }
    .fdx-removed .fdx-diff-hd { color: #cc3333; }
    .fdx-modified .fdx-diff-hd{ color: #7a5c00; }
    .fdx-diff-note { font-weight: 400; color: var(--text-muted); font-size: 11px; }
    .fdx-diff-items { display: flex; flex-wrap: wrap; gap: 4px; }
    .fdx-sc-chip { font-size: 11px; background: rgba(255,255,255,0.7); border: 1px solid var(--border); border-radius: 4px; padding: 1px 6px; font-family: monospace; }
    .fdx-diff-mod-row { font-size: 12px; margin-top: 5px; line-height: 1.5; }
    .fdx-diff-change { color: var(--text-muted); font-size: 11px; }
    .fdx-modal-actions { display: flex; justify-content: space-between; align-items: center; padding-top: 16px; border-top: 1px solid var(--border); gap: 8px; flex-wrap: wrap; }
    .fdx-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 7px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; font-family: inherit; transition: border-color .1s; }
    .fdx-btn:hover { border-color: var(--border2); }
    .fdx-btn-primary { background: var(--text); border-color: var(--text); color: var(--bg); }
    .fdx-btn-primary:hover { opacity: .85; }
    .fdx-btn-danger { border-color: #e0b0b0; color: #cc3333; }
    .fdx-btn-danger:hover { background: #fff0f0; }
    .fdx-toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(0,0,0,.82); color: #fff; font-size: 13px; font-weight: 500; padding: 10px 20px; border-radius: 20px; opacity: 0; transition: opacity 200ms, transform 200ms; pointer-events: none; z-index: 3000; white-space: nowrap; }
    .fdx-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="topbar">
  <a href="/" class="back-link">← Projets</a>
  <div class="project-title" id="project-title">—</div>
  <div class="project-format-lbl" id="project-format"></div>
  <div class="section-toggle" id="section-toggle">
    <button data-section="en-cours">En cours</button>
    <button data-section="en-dev">En développement</button>
  </div>
  <div class="sync-dot" id="sync-dot"></div>
</div>

<div class="content">

  <!-- SCÉNARIO -->
  <div class="section">
    <div class="section-header">
      <p class="section-label">Scénario</p>
      <button class="btn" id="btn-import-fdx">Importer FDX</button>
      <input type="file" id="fdx-file-input" accept=".fdx" style="display:none;" multiple>
    </div>
    <div class="scenario-box">
      <div id="scenario-content">
        <div class="scenario-empty">Aucune scène importée.</div>
      </div>
    </div>
  </div>

  <!-- OUTILS -->
  <div class="section">
    <div class="section-header">
      <p class="section-label">Outils</p>
    </div>
    <div id="tools-list"></div>
    <div class="add-tool-wrap" id="add-tool-wrap"></div>
  </div>

</div>

<script>
const STORAGE_KEY  = 'outils_landing_v1';
const SUPABASE_URL = 'https://dvivafrldxzhkactsvve.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR2aXZhZnJsZHh6aGthY3RzdnZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMzQ5MDgsImV4cCI6MjA5NDgxMDkwOH0.EgyxWDERi443hefaM0LxDYDhLWQYx31feKzQ1bQU5Kc';

const params      = new URLSearchParams(location.search);
const projectId   = params.get('p');
const SCENES_KEY  = projectId + '_scenes';

if (!projectId) location.href = '/';

let sb = null;
try { sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY); } catch(e) {}

const AVAILABLE_TOOLS = [
  { id: 'tableau-lieux', label: 'Tableau des lieux',   buildHref: p => '/tableau-des-lieux/?p=' + enc(p.id) + '&n=' + enc(p.name), buildKey: p => p.id + '_tdl' },
  { id: 'decoupage',     label: 'Découpage technique', buildHref: p => '/decoupage/?p='          + enc(p.id) + '&n=' + enc(p.name), buildKey: p => p.id + '_dec' },
  { id: 'personnages',   label: 'Personnages',          buildHref: p => '/personnages/?p='        + enc(p.id) + '&n=' + enc(p.name), buildKey: p => p.id + '_personnages' }
];
const DEFAULT_PROJECTS = [
  { id: 'derniere-saison', name: 'La dernière saison',      format: 'Série télévision', section: 'en-cours', tools: [] },
  { id: 'premier-trio',    name: 'Premier trio — Saison 4', format: 'Série télévision', section: 'en-cours', tools: [] },
  { id: 'les-chacals',     name: 'Les Chacals',             format: 'Long-métrage',     section: 'en-dev',   tools: [{ id: 'tableau-lieux', label: 'Tableau des lieux', href: '/tableau-des-lieux/?p=les-chacals&n=Les+Chacals', supabaseKey: 'les-chacals_tdl' }] },
  { id: 'aimer-pour-deux', name: 'Aimer pour deux',         format: 'Long-métrage',     section: 'en-dev',   tools: [] },
  { id: 'au-dela-terril',  name: 'Au-delà du terril',       format: 'Long-métrage',     section: 'en-dev',   tools: [] },
  { id: 'contritions',     name: 'Contritions / Clippeurs', format: 'Long-métrage',     section: 'en-dev',   tools: [] },
  { id: 'helga-testorf',   name: 'Helga Testorf',           format: 'Long-métrage',     section: 'en-dev',   tools: [] },
  { id: 'maison-lynch',    name: 'La maison du rang Lynch', format: 'Long-métrage',     section: 'en-dev',   tools: [] },
  { id: 'les-enfants',     name: 'Les enfants',             format: 'Série télévision', section: 'en-dev',   tools: [] },
];

let projects = [], currentProject = null;
let scenesRaw = [], fdxVersions = [], fdxImportMeta = {}, totalEpisodes = 0;

function enc(s) { return encodeURIComponent(s || ''); }

// ── SYNC DOT ──
function setSyncStatus(s) {
  const dot = document.getElementById('sync-dot');
  if (!dot) return;
  dot.className = 'sync-dot' + (s !== 'idle' ? ' ' + s : '');
}

// ── PROJET STATE ──
async function loadProjectState() {
  if (!sb) return null;
  try {
    const { data } = await sb.from('project_data').select('data').eq('key', STORAGE_KEY).single();
    return data?.data || null;
  } catch(e) { return null; }
}
async function saveProjectState(state) {
  setSyncStatus('syncing');
  if (!sb) { setTimeout(() => setSyncStatus('idle'), 1000); return; }
  try {
    await sb.from('project_data').upsert({ key: STORAGE_KEY, data: state, updated_at: new Date().toISOString() });
    setSyncStatus('synced');
    setTimeout(() => setSyncStatus('idle'), 2000);
  } catch(e) { setSyncStatus('error'); }
}
function saveLocal(state) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {} }
function loadLocal()      { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch(e) { return null; } }
function mergeState(saved) {
  const byId = {};
  DEFAULT_PROJECTS.forEach(p => byId[p.id] = p);
  if (!saved || !Array.isArray(saved)) return DEFAULT_PROJECTS.map(p => ({ ...p }));
  return saved.map(s => s && byId[s.id] ? { ...byId[s.id], section: s.section, tools: (s.tools && s.tools.length) ? s.tools : (byId[s.id].tools || []) } : null).filter(Boolean);
}
function persistProjectState() {
  const state = projects.map(p => ({ id: p.id, section: p.section, tools: p.tools || [] }));
  saveLocal(state);
  saveProjectState(state);
}

// ── SCÈNES ──
async function loadScenesData() {
  if (!sb) return;
  try {
    const { data: row } = await sb.from('project_data').select('data').eq('key', SCENES_KEY).maybeSingle();
    const d = row?.data || {};
    scenesRaw     = d.imported_scenes_raw || [];
    fdxVersions   = d.fdxVersions || [];
    fdxImportMeta = d.fdxImportMeta || {};
    totalEpisodes = d.totalEpisodes || 0;
  } catch(e) {}
}
async function saveScenesData() {
  if (!sb) return;
  setSyncStatus('syncing');
  try {
    await sb.from('project_data').upsert({
      key: SCENES_KEY,
      data: { imported_scenes_raw: scenesRaw, fdxVersions, fdxImportMeta, totalEpisodes },
      updated_at: new Date().toISOString()
    });
    setSyncStatus('synced');
    setTimeout(() => setSyncStatus('idle'), 2000);
  } catch(e) { setSyncStatus('error'); }
}

// ── SECTION TOGGLE ──
function renderSectionToggle() {
  document.getElementById('section-toggle').querySelectorAll('button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.section === currentProject.section);
    btn.onclick = () => {
      currentProject.section = btn.dataset.section;
      persistProjectState();
      renderSectionToggle();
    };
  });
}

// ── SCÉNARIO META ──
function renderScenarioSection() {
  const el = document.getElementById('scenario-content');
  const tableHref = '/scenes/?p=' + enc(projectId) + '&n=' + enc(currentProject.name);
  if (!scenesRaw.length) {
    el.innerHTML = '<div class="scenario-empty">Aucune scène importée. Importez un fichier FDX pour commencer.</div>';
    return;
  }

  // Ligne 1 : nb scènes · nb épisodes
  const nbSc  = scenesRaw.length;
  const nbEp  = totalEpisodes || Object.keys(fdxImportMeta || {}).map(Number).filter(e => e > 0).length;
  const countLine = nbSc + ' scène' + (nbSc > 1 ? 's' : '')
    + (nbEp > 0 ? ' · ' + nbEp + ' épisode' + (nbEp > 1 ? 's' : '') : '');

  // Ligne 2 : date la plus récente tous épisodes confondus
  const metas = Object.values(fdxImportMeta || {}).filter(m => m?.date);
  const lastMeta = metas.sort((a, b) => new Date(b.date) - new Date(a.date))[0];
  const lastDate = lastMeta?.date
    ? new Date(lastMeta.date).toLocaleDateString('fr-CA', { year: 'numeric', month: 'long', day: 'numeric' })
    : '';

  // Lignes épisodes : une par clé numérique > 0, triées
  const epKeys = Object.keys(fdxImportMeta || {})
    .map(Number).filter(e => e > 0).sort((a, b) => a - b);

  let epLinesHtml = '';
  if (epKeys.length) {
    epLinesHtml = '<div class="ep-lines">' + epKeys.map(ep => {
      const meta  = fdxImportMeta[String(ep)] || {};
      const label = (meta.label || '').replace(/\.fdx$/i, '').trim();
      return `<div class="ep-line">
        <span class="ep-num">Épisode ${String(ep).padStart(2, '0')}</span>
        <span class="ep-sep">·</span>
        <span class="ep-label">${label || '—'}</span>
      </div>`;
    }).join('') + '</div>';
  } else if (lastMeta?.label) {
    // Import monofichier (clé '0') : afficher le label sans numéro d'épisode
    const label = lastMeta.label.replace(/\.fdx$/i, '').trim();
    epLinesHtml = `<div class="ep-lines"><div class="ep-line">
      <span class="ep-label">${label}</span>
    </div></div>`;
  }

  // Versions archivées
  let versionsHtml = '';
  if (fdxVersions.length) {
    const shown = fdxVersions.slice(-5).reverse();
    const rows = shown.map(v => {
      const date = v.date ? new Date(v.date).toLocaleDateString('fr-CA', { month: 'short', day: 'numeric', year: 'numeric' }) : '—';
      const delta = v.prev_scene_count != null ? v.scene_count - v.prev_scene_count : null;
      const deltaHtml = delta === null || delta === 0 ? '' :
        `<span class="ver-mini-delta ${delta > 0 ? 'pos' : 'neg'}">${delta > 0 ? '+' : ''}${delta}</span>`;
      return `<div class="ver-mini-row">
        <span class="ver-mini-label">${v.label || 'Version'}</span>
        <span class="ver-mini-info">${date} · ${v.scene_count} sc.</span>
        ${deltaHtml}
      </div>`;
    }).join('');
    const more = fdxVersions.length > 5
      ? `<div class="ver-mini-more">+ ${fdxVersions.length - 5} autre${fdxVersions.length - 5 > 1 ? 's' : ''}</div>` : '';
    versionsHtml = `<div class="versions-mini">
      <div class="versions-mini-title">Versions archivées</div>
      <div class="ver-mini-list">${rows}</div>
      ${more}
    </div>`;
  }

  el.innerHTML = `
    <div class="scenario-main">
      <div class="scenario-info">
        <div class="scenario-count">${countLine}</div>
        ${lastDate ? `<div class="scenario-date">${lastDate}</div>` : ''}
        ${epLinesHtml}
      </div>
      <a class="scenario-link" href="${tableHref}">Ouvrir la table →</a>
    </div>
    ${versionsHtml}`;
}

// ── FDX IMPORT AVANCÉ ──
let _pendingFiles = [], _pendingImport = null;

function _fdxShowToast(msg) {
  let t = document.getElementById('fdx-toast-el');
  if (!t) { t = document.createElement('div'); t.id = 'fdx-toast-el'; t.className = 'fdx-toast'; document.body.appendChild(t); }
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove('show'), 2800);
}

document.getElementById('btn-import-fdx').onclick = () => document.getElementById('fdx-file-input').click();
document.getElementById('fdx-file-input').onchange = function(evt) { onFdxFileSelected(evt); };

function onFdxFileSelected(evt) {
  const files = Array.from(evt.target.files);
  evt.target.value = '';
  if (!files.length) return;
  Promise.all(files.map(f => new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => res({ name: f.name, content: e.target.result });
    r.onerror = () => rej(new Error(`Impossible de lire ${f.name}`));
    r.readAsText(f);
  }))).then(fileContents => {
    fileContents.sort((a, b) => a.name.localeCompare(b.name));
    _pendingFiles = fileContents;
    const detected = _detectFdxOptions(fileContents[0].content);
    if (detected.suggestDash || detected.hasCompactNums || (detected.isSeries && !totalEpisodes)) {
      _showFdxOptionsDialog(detected);
    } else {
      _runBatchParse({});
    }
  }).catch(err => _fdxShowToast('Erreur lecture FDX : ' + err.message));
}

function _showFdxOptionsDialog(detected) {
  const existing = document.getElementById('fdx-opts-overlay');
  if (existing) existing.remove();
  let sepSection = '', serieSection = '', nbEpSection = '';
  if (detected.suggestDash) {
    sepSection = `<div class="fdx-opts-section">
      <div class="fdx-opts-label">Séparateur de sous-lieu détecté</div>
      <div class="fdx-opts-choices">
        <label class="fdx-opts-choice"><input type="radio" name="fdx-sep" value="dash" checked>
          <div class="fdx-opts-choice-body"><span class="fdx-opts-choice-title">Tiret / cadratin</span><span class="fdx-opts-choice-ex">INT. MAISON — SALON — JOUR</span></div></label>
        <label class="fdx-opts-choice"><input type="radio" name="fdx-sep" value="slash">
          <div class="fdx-opts-choice-body"><span class="fdx-opts-choice-title">Barre oblique</span><span class="fdx-opts-choice-ex">INT. MAISON / SALON — JOUR</span></div></label>
        <label class="fdx-opts-choice"><input type="radio" name="fdx-sep" value="paren">
          <div class="fdx-opts-choice-body"><span class="fdx-opts-choice-title">Parenthèse</span><span class="fdx-opts-choice-ex">INT. MAISON (SALON) — JOUR</span></div></label>
      </div></div>`;
  }
  if (detected.hasCompactNums) {
    serieSection = `<div class="fdx-opts-section">
      <div class="fdx-opts-label">Numérotation des scènes — série détectée</div>
      <div class="fdx-opts-choices">
        <label class="fdx-opts-choice"><input type="radio" name="fdx-serie" value="compact" checked>
          <div class="fdx-opts-choice-body"><span class="fdx-opts-choice-title">Format compact</span><span class="fdx-opts-choice-ex">103 = épisode 1, scène 03</span></div></label>
        <label class="fdx-opts-choice"><input type="radio" name="fdx-serie" value="dot">
          <div class="fdx-opts-choice-body"><span class="fdx-opts-choice-title">Format ep.scène</span><span class="fdx-opts-choice-ex">1.03 — numéroter tel quel</span></div></label>
      </div></div>`;
  }
  if (detected.isSeries && !totalEpisodes) {
    nbEpSection = `<div class="fdx-opts-section">
      <div class="fdx-opts-label">Nombre total d'épisodes de la série</div>
      <div style="display:flex;align-items:center;gap:10px;margin-top:8px;">
        <input id="fdx-total-eps" type="number" min="1" max="500" placeholder="ex. 13"
          style="width:76px;padding:6px 10px;border-radius:6px;border:1px solid var(--border2);background:var(--bg);color:var(--text);font-family:inherit;font-size:13px;outline:none;">
        <span style="font-size:11px;color:var(--text-muted);line-height:1.4;">Calibre le strip de position dans les cartons.</span>
      </div></div>`;
  }
  const ov = document.createElement('div');
  ov.id = 'fdx-opts-overlay';
  ov.className = 'fdx-modal-overlay';
  ov.innerHTML = `<div class="fdx-modal" style="max-width:460px;">
    <div class="fdx-modal-hd">
      <div><h2>Paramètres d'import</h2>
        <div class="fdx-modal-sub">${_pendingFiles.length === 1 ? _pendingFiles[0].name : `${_pendingFiles.length} fichiers sélectionnés`}</div></div>
      <button class="fdx-modal-close" onclick="document.getElementById('fdx-opts-overlay').remove()">✕</button>
    </div>
    ${sepSection}${serieSection}${nbEpSection}
    <div class="fdx-modal-actions" style="margin-top:20px;">
      <button class="fdx-btn fdx-btn-danger" onclick="document.getElementById('fdx-opts-overlay').remove()">Annuler</button>
      <button class="fdx-btn fdx-btn-primary" onclick="_applyFdxOptions()">Continuer →</button>
    </div></div>`;
  document.body.appendChild(ov);
  ov.addEventListener('click', e => { if (e.target === ov) ov.remove(); });
}

function _applyFdxOptions() {
  const opts = {};
  const sepEl = document.querySelector('input[name="fdx-sep"]:checked');
  if (sepEl) opts.sep = sepEl.value;
  const serieEl = document.querySelector('input[name="fdx-serie"]:checked');
  if (serieEl && serieEl.value === 'compact') opts.serieFormat = 'compact';
  const epEl = document.getElementById('fdx-total-eps');
  if (epEl && epEl.value) { const n = parseInt(epEl.value); if (n > 0) totalEpisodes = n; }
  document.getElementById('fdx-opts-overlay')?.remove();
  _runBatchParse(opts);
}

function _runBatchParse(opts) {
  try {
    let allNewScenes = [], allErrors = [];
    for (const { name, content } of _pendingFiles) {
      const { scenes: ns, errors } = parseFDXToScenes(content, opts);
      allNewScenes = [...allNewScenes, ...ns];
      allErrors = [...allErrors, ...errors.map(e => _pendingFiles.length > 1 ? `[${name}] ${e}` : e)];
    }
    const scMap = new Map();
    allNewScenes.forEach((s, i) => scMap.set(_sceneMapKey(s, i), s));
    const newScenes = [...scMap.values()].sort(_scSort);
    if (!newScenes.length) { _fdxShowToast('Aucune scène trouvée dans ces fichiers FDX'); return; }
    const currentBase = scenesRaw;
    const newEps = new Set(newScenes.map(s => parseEp(s.sc).ep));
    const relevantBase = currentBase.filter(s => newEps.has(parseEp(s.sc).ep));
    const diff = diffScenes(relevantBase, newScenes);
    const isNewEpisode = relevantBase.length === 0 && currentBase.length > 0;
    const filename = _pendingFiles.length === 1 ? _pendingFiles[0].name : `${_pendingFiles.length} fichiers FDX`;
    _pendingImport = { newScenes, diff, filename, errors: allErrors, newEps, isNewEpisode };
    _showImportDialog();
  } catch(err) { _fdxShowToast('Erreur FDX : ' + err.message); }
}

function _showImportDialog() {
  const { newScenes, diff, filename, errors, isNewEpisode } = _pendingImport;
  const { added, removed, modified, unchanged } = diff;
  let errHtml = '';
  if (errors.length) {
    errHtml = `<div class="fdx-errors"><div class="fdx-err-hd">⚠ ${errors.length} erreur${errors.length>1?'s':''} d'intégration</div>
      ${errors.map(e=>`<div class="fdx-err-item">${e}</div>`).join('')}</div>`;
  }
  let diffHtml = '';
  if (added.length)    diffHtml += `<div class="fdx-diff-section fdx-added"><div class="fdx-diff-hd">+ ${added.length} scène${added.length>1?'s':''} ajoutée${added.length>1?'s':''}</div><div class="fdx-diff-items">${added.map(s=>`<span class="fdx-sc-chip">${s.sc}</span>`).join('')}</div></div>`;
  if (removed.length)  diffHtml += `<div class="fdx-diff-section fdx-removed"><div class="fdx-diff-hd">− ${removed.length} scène${removed.length>1?'s':''} supprimée${removed.length>1?'s':''} <span class="fdx-diff-note">(conservées biffées)</span></div><div class="fdx-diff-items">${removed.map(s=>`<span class="fdx-sc-chip">${s.sc}</span>`).join('')}</div></div>`;
  if (modified.length) diffHtml += `<div class="fdx-diff-section fdx-modified"><div class="fdx-diff-hd">↻ ${modified.length} scène${modified.length>1?'s':''} modifiée${modified.length>1?'s':''}</div><div class="fdx-diff-items">${modified.map(m=>{
    const ch=[];
    if(m.old.lieu!==m.new.lieu) ch.push(`lieu: ${m.old.lieu} → ${m.new.lieu}`);
    if(m.old.sous_lieu!==m.new.sous_lieu) ch.push(`sous-lieu: ${m.old.sous_lieu||'—'} → ${m.new.sous_lieu||'—'}`);
    if(m.old.jn!==m.new.jn) ch.push(`${m.old.jn} → ${m.new.jn}`);
    if(m.old.int_ext!==m.new.int_ext) ch.push(`${m.old.int_ext} → ${m.new.int_ext}`);
    if(m.old.page!==m.new.page) ch.push(`p.${m.old.page} → p.${m.new.page}`);
    return `<div class="fdx-diff-mod-row"><strong>${m.new.sc}</strong> <span class="fdx-diff-change">${ch.join(' · ')}</span></div>`;
  }).join('')}</div></div>`;
  if (!added.length && !removed.length && !modified.length)
    diffHtml = `<div class="fdx-no-diff">Aucun changement — ${unchanged.length} scènes identiques.</div>`;
  const episodeNote = isNewEpisode
    ? `<div class="fdx-errors" style="background:#f0f8ff;border-color:#a0c8e8;"><div class="fdx-err-hd" style="color:#1a4a70;">Nouvel épisode détecté</div><div style="font-size:11px;color:#1a4a70;">Les scènes des épisodes existants seront conservées intactes.</div></div>`
    : '';
  const el = document.createElement('div');
  el.className = 'fdx-modal-overlay'; el.id = 'fdx-modal-overlay';
  el.onclick = (e) => { if(e.target===el) closeImportDialog(); };
  el.innerHTML = `<div class="fdx-modal">
    <div class="fdx-modal-hd">
      <div><h2>Importer FDX</h2><div class="fdx-modal-sub">${filename} · ${newScenes.length} scènes</div></div>
      <button class="fdx-modal-close" onclick="closeImportDialog()">✕</button>
    </div>
    ${episodeNote}${errHtml}
    <div class="fdx-diff-wrap">${diffHtml}</div>
    <div class="fdx-modal-actions">
      <button class="fdx-btn fdx-btn-danger" onclick="closeImportDialog()">Annuler</button>
      <div style="display:flex;gap:8px;">
        <button class="fdx-btn" onclick="applyImport('overwrite')" title="Remplace tout et réinitialise les annotations">Écraser tout</button>
        <button class="fdx-btn fdx-btn-primary" onclick="applyImport('merge')">Merger — préserver les annotations</button>
      </div>
    </div></div>`;
  document.body.appendChild(el);
}

function closeImportDialog() {
  const el = document.getElementById('fdx-modal-overlay');
  if (el) el.remove();
  _pendingImport = null;
}

async function applyImport(mode) {
  if (!_pendingImport) return;
  const { newScenes, filename, newEps } = _pendingImport;
  const today = new Date().toISOString().split('T')[0];
  const newEntries = [];
  for (const ep of newEps) {
    const epPrev = scenesRaw.filter(s => parseEp(s.sc).ep === ep);
    const epNew  = newScenes.filter(s => parseEp(s.sc).ep === ep);
    let epLabel  = filename.replace(/\.fdx$/i,'');
    if (_pendingFiles.length > 1) {
      const epFile = _pendingFiles.find(f => {
        const base = f.name.replace(/\.fdx$/i,'').toLowerCase();
        return base.includes(`ep${String(ep).padStart(2,'0')}`) || base.includes(`ep${ep}`) || base.endsWith(`0${ep}`) || base.endsWith(`_${ep}`);
      });
      epLabel = epFile ? epFile.name.replace(/\.fdx$/i,'') : _pendingFiles.map(f => f.name.replace(/\.fdx$/i,'')).join(', ');
    }
    if (epPrev.length) {
      newEntries.push({ id: Date.now() + ep, date: today, label: epLabel, ep,
        scene_count: epNew.length, prev_scene_count: epPrev.length,
        scenes_raw: JSON.parse(JSON.stringify(epPrev)) });
    }
    fdxImportMeta[ep] = { label: epLabel, date: today, scene_count: epNew.length };
  }
  if (newEntries.length) fdxVersions = [...newEntries, ...fdxVersions].slice(0, 60);

  // Merge raw scenes (toujours : on conserve les épisodes non touchés)
  const keptBase = scenesRaw.filter(s => !newEps.has(parseEp(s.sc).ep));
  scenesRaw = [...keptBase, ...newScenes].sort(_scSort);

  // Écraser tout : effacer aussi les annotations TdL des épisodes importés
  if (mode === 'overwrite' && sb) {
    try {
      const TDL_KEY = projectId + '_tdl';
      const { data: tdlRow } = await sb.from('project_data').select('data').eq('key', TDL_KEY).maybeSingle();
      if (tdlRow?.data?.scenes) {
        const tdlData = tdlRow.data;
        const keptScenes  = tdlData.scenes.filter(s => !newEps.has(parseEp(s.sc).ep));
        const freshScenes = newScenes.map(ns => ({ ...ns, ep:'', steadicam:false, rails:false, epaule:false, fixe:false, lieu_tournage_id:'', notes:'', struck:false }));
        tdlData.scenes = [...keptScenes, ...freshScenes].sort(_scSort);
        await sb.from('project_data').upsert({ key: TDL_KEY, data: tdlData, updated_at: new Date().toISOString() });
      }
    } catch(e) { console.warn('Overwrite TdL annotations:', e); }
  }

  closeImportDialog();
  await saveScenesData();
  renderScenarioSection();
  _fdxShowToast(`FDX importé — ${newScenes.length} scènes`);
}

// ── OUTILS ──
function renderTools() {
  const p = currentProject;
  const list = document.getElementById('tools-list');
  list.innerHTML = '';
  if (!p.tools || !p.tools.length) {
    const el = document.createElement('p');
    el.className = 'no-tools';
    el.textContent = 'Aucun outil ajouté.';
    list.appendChild(el);
  } else {
    p.tools.forEach(t => {
      const row = document.createElement('div');
      row.className = 'tool-row';
      row.innerHTML = `<div class="tool-name">${t.label}</div>
        <div class="tool-actions">
          <a class="btn-open" href="${t.href}">Ouvrir</a>
          <button class="btn-remove" title="Retirer">×</button>
        </div>`;
      row.querySelector('.btn-remove').addEventListener('click', async () => {
        if (!confirm('Retirer « ' + t.label + ' » ?\n\nToutes les données seront supprimées définitivement.')) return;
        p.tools = p.tools.filter(x => x.id !== t.id);
        if (t.supabaseKey && sb) { try { await sb.from('project_data').delete().eq('key', t.supabaseKey); } catch(e) {} }
        persistProjectState();
        renderTools();
        renderAddButton();
      });
      list.appendChild(row);
    });
  }
}
function renderAddButton() {
  const p = currentProject;
  const wrap = document.getElementById('add-tool-wrap');
  wrap.innerHTML = '';
  const addedIds = new Set((p.tools || []).map(t => t.id));
  const remaining = AVAILABLE_TOOLS.filter(t => !addedIds.has(t.id));
  if (!remaining.length) return;
  const btn = document.createElement('button');
  btn.className = 'btn-add';
  btn.textContent = '+ Ajouter un outil';
  btn.addEventListener('click', e => {
    e.stopPropagation();
    if (wrap.querySelector('.tool-dropdown')) { wrap.querySelector('.tool-dropdown').remove(); return; }
    const dd = document.createElement('div');
    dd.className = 'tool-dropdown';
    remaining.forEach(toolDef => {
      const item = document.createElement('button');
      item.textContent = toolDef.label;
      item.addEventListener('click', ev => {
        ev.stopPropagation();
        if (!p.tools) p.tools = [];
        p.tools.push({ id: toolDef.id, label: toolDef.label, href: toolDef.buildHref(p), supabaseKey: toolDef.buildKey(p) });
        persistProjectState();
        renderTools();
        renderAddButton();
        dd.remove();
      });
      dd.appendChild(item);
    });
    wrap.appendChild(dd);
  });
  wrap.appendChild(btn);
}

document.addEventListener('click', () => document.querySelectorAll('.tool-dropdown').forEach(d => d.remove()));

// ── INIT ──
async function init() {
  let state = mergeState(loadLocal());
  projects = state;
  currentProject = projects.find(p => p.id === projectId);
  if (!currentProject) { location.href = '/'; return; }

  document.title = currentProject.name + ' — Projet';
  document.getElementById('project-title').textContent = currentProject.name;
  document.getElementById('project-format').textContent = currentProject.format || '';
  renderSectionToggle();
  renderTools();
  renderAddButton();

  const [remote] = await Promise.all([loadProjectState(), loadScenesData()]);
  renderScenarioSection();

  if (remote) {
    saveLocal(remote);
    projects = mergeState(remote);
    currentProject = projects.find(p => p.id === projectId);
    if (currentProject) { renderSectionToggle(); renderTools(); renderAddButton(); }
  }
}

init();
</script>
