<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projet — Outils</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg2: #f8f8f8; --bg3: #f0f0f0;
      --border: #e7e7e7; --border2: #cccccc;
      --text: #111111; --text-muted: #777777; --text-dim: #aaaaaa;
    }
    html { font-size: 13px; -webkit-font-smoothing: antialiased; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height: 1.4; }

    /* ── TOPBAR ── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg2); border-bottom: 1px solid var(--border);
      padding: 14px 24px; display: flex; align-items: center; gap: 14px;
    }
    .back-link { font-size: 11px; color: var(--text-muted); text-decoration: none; letter-spacing: .06em; flex-shrink: 0; }
    .back-link:hover { color: var(--text); }
    .topbar-divider { width: 1px; height: 16px; background: var(--border); flex-shrink: 0; }
    .project-title { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .project-format-lbl { font-size: 11px; color: var(--text-muted); flex-shrink: 0; white-space: nowrap; }
    .section-toggle { display: inline-flex; border: 1px solid var(--border); border-radius: 3px; overflow: hidden; flex-shrink: 0; }
    .section-toggle button {
      background: none; border: none; cursor: pointer; font-family: inherit;
      font-size: 10px; letter-spacing: .1em; text-transform: uppercase;
      color: var(--text-muted); padding: 4px 10px; transition: background 100ms, color 100ms;
    }
    .section-toggle button.active { background: var(--text); color: var(--bg); }
    .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border2); transition: background 300ms; flex-shrink: 0; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
    .sync-dot.syncing { background: #f0a500; animation: pulse .9s infinite; }
    .sync-dot.synced  { background: #5a9a6a; }
    .sync-dot.error   { background: #cc3333; }

    /* ── CONTENT ── */
    .content { max-width: 700px; margin: 0 auto; padding: 40px 24px 80px; }

    /* ── SECTIONS ── */
    .section { margin-bottom: 44px; }
    .section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .section-label { font-size: 10px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: var(--text-muted); }
    .btn { background: var(--bg3); border: 1px solid var(--border); border-radius: 5px; cursor: pointer; font-size: 12px; font-family: inherit; color: var(--text); padding: 5px 12px; white-space: nowrap; transition: border-color .1s; }
    .btn:hover { border-color: var(--border2); }

    /* ── SCÉNARIO ── */
    .scenario-box { border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
    .scenario-main { display: flex; align-items: center; gap: 16px; padding: 14px 16px; }
    .scenario-info { flex: 1; min-width: 0; }
    .scenario-count { font-size: 14px; font-weight: 700; }
    .scenario-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .scenario-label { font-style: italic; }
    .scenario-eps { color: var(--text-dim); }
    .scenario-link { font-size: 12px; color: var(--text); text-decoration: none; white-space: nowrap; border-bottom: 1px solid var(--border); padding-bottom: 1px; flex-shrink: 0; }
    .scenario-link:hover { border-color: var(--text); }
    .scenario-empty { padding: 14px 16px; font-size: 12px; color: var(--text-muted); line-height: 1.6; }

    /* ── VERSIONS MINI ── */
    .versions-mini { border-top: 1px solid var(--border); padding: 10px 16px; }
    .versions-mini-title { font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; }
    .ver-mini-list { display: flex; flex-direction: column; gap: 4px; }
    .ver-mini-row { display: flex; align-items: center; gap: 12px; font-size: 11px; color: var(--text-muted); }
    .ver-mini-label { font-weight: 600; color: var(--text); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ver-mini-info { white-space: nowrap; }
    .ver-mini-delta { font-size: 10px; font-weight: 600; white-space: nowrap; }
    .ver-mini-delta.pos { color: #2a7a40; }
    .ver-mini-delta.neg { color: #cc3333; }
    .ver-mini-more { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

    /* ── OUTILS ── */
    .tool-row { display: flex; align-items: center; justify-content: space-between; padding: 13px 0; border-bottom: 1px solid var(--border); }
    .tool-row:first-of-type { border-top: 1px solid var(--border); }
    .tool-name { font-size: 13px; }
    .tool-actions { display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
    .btn-open { font-size: 11px; color: var(--text); text-decoration: none; letter-spacing: .04em; border-bottom: 1px solid var(--border); padding-bottom: 1px; }
    .btn-open:hover { border-color: var(--text); }
    .btn-remove { background: none; border: none; cursor: pointer; font-size: 14px; color: var(--text-muted); line-height: 1; padding: 0 2px; opacity: 0; transition: opacity 150ms; }
    .tool-row:hover .btn-remove { opacity: 1; }
    .btn-remove:hover { color: var(--text); }
    .no-tools { font-size: 12px; color: var(--text-muted); padding: 13px 0; }
    .add-tool-wrap { position: relative; margin-top: 14px; }
    .btn-add { background: none; border: 1px solid var(--border); border-radius: 3px; cursor: pointer; font-size: 11px; color: var(--text-muted); letter-spacing: .06em; padding: 7px 12px; font-family: inherit; }
    .btn-add:hover { border-color: var(--text); color: var(--text); }
    .tool-dropdown { position: absolute; left: 0; top: calc(100% + 6px); background: #fff; border: 1px solid var(--border); border-radius: 4px; box-shadow: 0 4px 18px rgba(0,0,0,.1); z-index: 200; min-width: 200px; overflow: hidden; }
    .tool-dropdown button { display: block; width: 100%; text-align: left; background: none; border: none; cursor: pointer; font-family: inherit; padding: 10px 14px; font-size: 12px; color: var(--text); }
    .tool-dropdown button:hover { background: var(--bg3); }
  </style>
</head>
<body>

<div class="topbar">
  <a href="/" class="back-link">← Projets</a>
  <div class="topbar-divider"></div>
  <div class="project-title" id="project-title">—</div>
  <div class="project-format-lbl" id="project-format"></div>
  <div class="section-toggle" id="section-toggle">
    <button data-section="en-cours">En cours</button>
    <button data-section="en-dev">En développement</button>
  </div>
  <div class="sync-dot" id="sync-dot"></div>
</div>

<div class="content">

  <!-- SCÉNARIO -->
  <div class="section">
    <div class="section-header">
      <p class="section-label">Scénario</p>
      <button class="btn" id="btn-import-fdx">Importer FDX</button>
      <input type="file" id="fdx-file-input" accept=".fdx" style="display:none;" multiple>
    </div>
    <div class="scenario-box">
      <div id="scenario-content">
        <div class="scenario-empty">Aucune scène importée.</div>
      </div>
    </div>
  </div>

  <!-- OUTILS -->
  <div class="section">
    <div class="section-header">
      <p class="section-label">Outils</p>
    </div>
    <div id="tools-list"></div>
    <div class="add-tool-wrap" id="add-tool-wrap"></div>
  </div>

</div>

<script>
const STORAGE_KEY  = 'outils_landing_v1';
const SUPABASE_URL = 'https://dvivafrldxzhkactsvve.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR2aXZhZnJsZHh6aGthY3RzdnZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMzQ5MDgsImV4cCI6MjA5NDgxMDkwOH0.EgyxWDERi443hefaM0LxDYDhLWQYx31feKzQ1bQU5Kc';

const params      = new URLSearchParams(location.search);
const projectId   = params.get('p');
const SCENES_KEY  = projectId + '_scenes';

if (!projectId) location.href = '/';

let sb = null;
try { sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY); } catch(e) {}

const AVAILABLE_TOOLS = [
  { id: 'tableau-lieux', label: 'Tableau des lieux',   buildHref: p => '/tableau-des-lieux/?p=' + enc(p.id) + '&n=' + enc(p.name), buildKey: p => p.id + '_tdl' },
  { id: 'decoupage',     label: 'Découpage technique', buildHref: p => '/decoupage/?p='          + enc(p.id) + '&n=' + enc(p.name), buildKey: p => p.id + '_dec' },
  { id: 'personnages',   label: 'Personnages',          buildHref: p => '/personnages/?p='        + enc(p.id) + '&n=' + enc(p.name), buildKey: p => p.id + '_personnages' }
];
const DEFAULT_PROJECTS = [
  { id: 'derniere-saison', name: 'La dernière saison',      format: 'Série télévision', section: 'en-cours', tools: [] },
  { id: 'premier-trio',    name: 'Premier trio — Saison 4', format: 'Série télévision', section: 'en-cours', tools: [] },
  { id: 'les-chacals',     name: 'Les Chacals',             format: 'Long-métrage',     section: 'en-dev',   tools: [{ id: 'tableau-lieux', label: 'Tableau des lieux', href: '/tableau-des-lieux/?p=les-chacals&n=Les+Chacals', supabaseKey: 'les-chacals_tdl' }] },
  { id: 'aimer-pour-deux', name: 'Aimer pour deux',         format: 'Long-métrage',     section: 'en-dev',   tools: [] },
  { id: 'au-dela-terril',  name: 'Au-delà du terril',       format: 'Long-métrage',     section: 'en-dev',   tools: [] },
  { id: 'contritions',     name: 'Contritions / Clippeurs', format: 'Long-métrage',     section: 'en-dev',   tools: [] },
  { id: 'helga-testorf',   name: 'Helga Testorf',           format: 'Long-métrage',     section: 'en-dev',   tools: [] },
  { id: 'maison-lynch',    name: 'La maison du rang Lynch', format: 'Long-métrage',     section: 'en-dev',   tools: [] },
  { id: 'les-enfants',     name: 'Les enfants',             format: 'Série télévision', section: 'en-dev',   tools: [] },
];

let projects = [], currentProject = null;
let scenesRaw = [], fdxVersions = [], fdxImportMeta = {}, totalEpisodes = 0;

function enc(s) { return encodeURIComponent(s || ''); }

// ── SYNC DOT ──
function setSyncStatus(s) {
  const dot = document.getElementById('sync-dot');
  if (!dot) return;
  dot.className = 'sync-dot' + (s !== 'idle' ? ' ' + s : '');
}

// ── PROJET STATE ──
async function loadProjectState() {
  if (!sb) return null;
  try {
    const { data } = await sb.from('project_data').select('data').eq('key', STORAGE_KEY).single();
    return data?.data || null;
  } catch(e) { return null; }
}
async function saveProjectState(state) {
  setSyncStatus('syncing');
  if (!sb) { setTimeout(() => setSyncStatus('idle'), 1000); return; }
  try {
    await sb.from('project_data').upsert({ key: STORAGE_KEY, data: state, updated_at: new Date().toISOString() });
    setSyncStatus('synced');
    setTimeout(() => setSyncStatus('idle'), 2000);
  } catch(e) { setSyncStatus('error'); }
}
function saveLocal(state) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {} }
function loadLocal()      { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch(e) { return null; } }
function mergeState(saved) {
  const byId = {};
  DEFAULT_PROJECTS.forEach(p => byId[p.id] = p);
  if (!saved || !Array.isArray(saved)) return DEFAULT_PROJECTS.map(p => ({ ...p }));
  return saved.map(s => s && byId[s.id] ? { ...byId[s.id], section: s.section, tools: (s.tools && s.tools.length) ? s.tools : (byId[s.id].tools || []) } : null).filter(Boolean);
}
function persistProjectState() {
  const state = projects.map(p => ({ id: p.id, section: p.section, tools: p.tools || [] }));
  saveLocal(state);
  saveProjectState(state);
}

// ── SCÈNES ──
async function loadScenesData() {
  if (!sb) return;
  try {
    const { data: row } = await sb.from('project_data').select('data').eq('key', SCENES_KEY).maybeSingle();
    const d = row?.data || {};
    scenesRaw     = d.imported_scenes_raw || [];
    fdxVersions   = d.fdxVersions || [];
    fdxImportMeta = d.fdxImportMeta || {};
    totalEpisodes = d.totalEpisodes || 0;
  } catch(e) {}
}
async function saveScenesData() {
  if (!sb) return;
  setSyncStatus('syncing');
  try {
    await sb.from('project_data').upsert({
      key: SCENES_KEY,
      data: { imported_scenes_raw: scenesRaw, fdxVersions, fdxImportMeta, totalEpisodes },
      updated_at: new Date().toISOString()
    });
    setSyncStatus('synced');
    setTimeout(() => setSyncStatus('idle'), 2000);
  } catch(e) { setSyncStatus('error'); }
}

// ── SECTION TOGGLE ──
function renderSectionToggle() {
  document.getElementById('section-toggle').querySelectorAll('button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.section === currentProject.section);
    btn.onclick = () => {
      currentProject.section = btn.dataset.section;
      persistProjectState();
      renderSectionToggle();
    };
  });
}

// ── SCÉNARIO META ──
function renderScenarioSection() {
  const el = document.getElementById('scenario-content');
  const tableHref = '/scenes/?p=' + enc(projectId) + '&n=' + enc(currentProject.name);
  if (!scenesRaw.length) {
    el.innerHTML = '<div class="scenario-empty">Aucune scène importée. Importez un fichier FDX pour commencer.</div>';
    return;
  }

  // Dernière meta par date
  const metas = Object.values(fdxImportMeta || {}).filter(m => m?.date);
  const lastMeta = metas.sort((a, b) => new Date(b.date) - new Date(a.date))[0];
  const lastDate = lastMeta?.date
    ? new Date(lastMeta.date).toLocaleDateString('fr-CA', { year: 'numeric', month: 'long', day: 'numeric' })
    : '';
  const lastLabel = lastMeta?.label || '';

  // Épisodes importés (clés numériques > 0 dans fdxImportMeta)
  const epKeys = Object.keys(fdxImportMeta || {})
    .map(Number).filter(e => e > 0).sort((a, b) => a - b);
  const epsLine = epKeys.length
    ? 'Épisodes ' + epKeys.map(e => String(e).padStart(2, '0')).join(', ')
    : '';

  const countEps = totalEpisodes > 0
    ? ` · ${totalEpisodes} épisode${totalEpisodes > 1 ? 's' : ''}`
    : '';

  let versionsHtml = '';
  if (fdxVersions.length) {
    const shown = fdxVersions.slice(-5).reverse();
    const rows = shown.map(v => {
      const date = v.date ? new Date(v.date).toLocaleDateString('fr-CA', { month: 'short', day: 'numeric', year: 'numeric' }) : '—';
      const delta = v.prev_scene_count != null ? v.scene_count - v.prev_scene_count : null;
      const deltaHtml = delta === null || delta === 0 ? '' :
        `<span class="ver-mini-delta ${delta > 0 ? 'pos' : 'neg'}">${delta > 0 ? '+' : ''}${delta}</span>`;
      return `<div class="ver-mini-row">
        <span class="ver-mini-label">${v.label || 'Version'}</span>
        <span class="ver-mini-info">${date} · ${v.scene_count} sc.</span>
        ${deltaHtml}
      </div>`;
    }).join('');
    const more = fdxVersions.length > 5 ? `<div class="ver-mini-more">+ ${fdxVersions.length - 5} autre${fdxVersions.length - 5 > 1 ? 's' : ''}</div>` : '';
    versionsHtml = `<div class="versions-mini">
      <div class="versions-mini-title">Versions archivées</div>
      <div class="ver-mini-list">${rows}</div>
      ${more}
    </div>`;
  }

  el.innerHTML = `
    <div class="scenario-main">
      <div class="scenario-info">
        <div class="scenario-count">${scenesRaw.length} scène${scenesRaw.length > 1 ? 's' : ''}${countEps}</div>
        ${lastDate ? `<div class="scenario-sub">${lastDate}</div>` : ''}
        ${lastLabel ? `<div class="scenario-sub scenario-label">${lastLabel}</div>` : ''}
        ${epsLine ? `<div class="scenario-sub scenario-eps">${epsLine}</div>` : ''}
      </div>
      <a class="scenario-link" href="${tableHref}">Ouvrir la table →</a>
    </div>
    ${versionsHtml}`;
}

// ── FDX IMPORT ──
document.getElementById('btn-import-fdx').onclick = () => document.getElementById('fdx-file-input').click();
document.getElementById('fdx-file-input').onchange = async evt => {
  const files = Array.from(evt.target.files);
  if (!files.length) return;
  evt.target.value = '';

  // fdx-parser.js is loaded by /scenes/ page; here we do a minimal parse
  // Load fdx-parser if not already loaded
  if (typeof parseFDXToScenes === 'undefined') {
    await new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = '/src/fdx-parser.js';
      s.onload = resolve; s.onerror = reject;
      document.head.appendChild(s);
    });
  }

  const loaded = await Promise.all(files.map(f => f.text().then(t => ({ name: f.name, content: t }))));
  let allScenes = [], allErrors = [];
  for (const { name, content } of loaded) {
    try {
      const opts = _detectFdxOptions(content);
      const parseOpts = { sep: opts.suggestDash ? 'dash' : 'slash', serieFormat: opts.hasCompactNums ? 'compact' : 'dot' };
      const { scenes, errors } = parseFDXToScenes(content, parseOpts);
      allScenes = [...allScenes, ...scenes];
      allErrors = [...allErrors, ...errors];
    } catch(e) { alert('Erreur FDX dans « ' + name + ' » : ' + e.message); return; }
  }
  const scMap = new Map();
  allScenes.forEach(s => scMap.set(s.sc, s));
  const newScenes = [...scMap.values()].sort(_scSort);
  if (!newScenes.length) { alert('Aucune scène trouvée.'); return; }

  const filename = files.length === 1 ? files[0].name : files.length + ' fichiers FDX';
  let msg = `${newScenes.length} scènes trouvées dans « ${filename} ».`;
  if (scenesRaw.length) msg += `\n\n${scenesRaw.length} scènes existantes seront remplacées.\nPour un import avec diff, utiliser le Tableau des lieux.`;
  if (!confirm(msg + '\n\nConfirmer l\'import ?')) return;

  if (scenesRaw.length) {
    fdxVersions = [...fdxVersions, {
      id: Date.now().toString(),
      date: new Date().toISOString(),
      label: 'Version précédente',
      ep: null,
      scene_count: scenesRaw.length,
      prev_scene_count: 0
    }].slice(-20);
  }
  scenesRaw = newScenes;
  const eps = new Set(newScenes.map(s => (typeof parseEp === 'function' ? parseEp(s.sc).ep : 0)).filter(e => e > 0));
  totalEpisodes = eps.size;
  fdxImportMeta = {};
  const now = new Date().toISOString();
  const label = filename.replace(/\.fdx$/i, '');
  fdxImportMeta['0'] = { label, date: now, scene_count: newScenes.length };

  await saveScenesData();
  renderScenarioSection();
};

// ── OUTILS ──
function renderTools() {
  const p = currentProject;
  const list = document.getElementById('tools-list');
  list.innerHTML = '';
  if (!p.tools || !p.tools.length) {
    const el = document.createElement('p');
    el.className = 'no-tools';
    el.textContent = 'Aucun outil ajouté.';
    list.appendChild(el);
  } else {
    p.tools.forEach(t => {
      const row = document.createElement('div');
      row.className = 'tool-row';
      row.innerHTML = `<div class="tool-name">${t.label}</div>
        <div class="tool-actions">
          <a class="btn-open" href="${t.href}">Ouvrir</a>
          <button class="btn-remove" title="Retirer">×</button>
        </div>`;
      row.querySelector('.btn-remove').addEventListener('click', async () => {
        if (!confirm('Retirer « ' + t.label + ' » ?\n\nToutes les données seront supprimées définitivement.')) return;
        p.tools = p.tools.filter(x => x.id !== t.id);
        if (t.supabaseKey && sb) { try { await sb.from('project_data').delete().eq('key', t.supabaseKey); } catch(e) {} }
        persistProjectState();
        renderTools();
        renderAddButton();
      });
      list.appendChild(row);
    });
  }
}
function renderAddButton() {
  const p = currentProject;
  const wrap = document.getElementById('add-tool-wrap');
  wrap.innerHTML = '';
  const addedIds = new Set((p.tools || []).map(t => t.id));
  const remaining = AVAILABLE_TOOLS.filter(t => !addedIds.has(t.id));
  if (!remaining.length) return;
  const btn = document.createElement('button');
  btn.className = 'btn-add';
  btn.textContent = '+ Ajouter un outil';
  btn.addEventListener('click', e => {
    e.stopPropagation();
    if (wrap.querySelector('.tool-dropdown')) { wrap.querySelector('.tool-dropdown').remove(); return; }
    const dd = document.createElement('div');
    dd.className = 'tool-dropdown';
    remaining.forEach(toolDef => {
      const item = document.createElement('button');
      item.textContent = toolDef.label;
      item.addEventListener('click', ev => {
        ev.stopPropagation();
        if (!p.tools) p.tools = [];
        p.tools.push({ id: toolDef.id, label: toolDef.label, href: toolDef.buildHref(p), supabaseKey: toolDef.buildKey(p) });
        persistProjectState();
        renderTools();
        renderAddButton();
        dd.remove();
      });
      dd.appendChild(item);
    });
    wrap.appendChild(dd);
  });
  wrap.appendChild(btn);
}

document.addEventListener('click', () => document.querySelectorAll('.tool-dropdown').forEach(d => d.remove()));

// ── INIT ──
async function init() {
  let state = mergeState(loadLocal());
  projects = state;
  currentProject = projects.find(p => p.id === projectId);
  if (!currentProject) { location.href = '/'; return; }

  document.title = currentProject.name + ' — Projet';
  document.getElementById('project-title').textContent = currentProject.name;
  document.getElementById('project-format').textContent = currentProject.format || '';
  renderSectionToggle();
  renderTools();
  renderAddButton();

  const [remote] = await Promise.all([loadProjectState(), loadScenesData()]);
  renderScenarioSection();

  if (remote) {
    saveLocal(remote);
    projects = mergeState(remote);
    currentProject = projects.find(p => p.id === projectId);
    if (currentProject) { renderSectionToggle(); renderTools(); renderAddButton(); }
  }
}

init();
</script>
</body>
</html>
